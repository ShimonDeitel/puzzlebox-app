name: Puzzlebox
options:
  bundleIdPrefix: com.shimondeitel.puzzlelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Puzzlebox:
    type: application
    platform: iOS
    sources:
      - path: Puzzlebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Puzzlebox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PuzzleboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PuzzleboxTests
      - path: Puzzlebox.storekit
    dependencies:
      - target: Puzzlebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PuzzleboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PuzzleboxUITests
    dependencies:
      - target: Puzzlebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puzzlelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Puzzlebox:
    build:
      targets:
        Puzzlebox: all
        PuzzleboxTests: [test]
        PuzzleboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Puzzlebox.storekit
    test:
      config: Debug
      storeKitConfiguration: Puzzlebox.storekit
      targets:
        - PuzzleboxTests
        - PuzzleboxUITests
    archive:
      config: Release
